<!DOCTYPE HTML>
<html>
    <head>
        <title> MY PORTFOLIO </title>
        <LINK REL="STYLESHEET" HREF="STYLES.CSS">
            <META NAME="VIEWPORT" content="WIDTH=DISPLAY-WIDTH, INITIAL-SCALE=1">
               <link rel="https://fonts.googleapis.com/css2?family=Noto+Sans&family=Roboto+mono&display=swap" rel="stylesheet">
    </head>
    <BODY>
        <DIV CLASS="CONTAINER">
            <div CLASS="INTRO">
                <IMG CLASS="PROFILE-PICTURE" WIDTH="150" HEIGHT="150" SRC="IMG/download.jpeg"/>
                <H1>OMOERA SEAN</H1>
                <H3>LEARNER AT CARRERFOUNDRY</H3>
                <P> (PAUSE AND PONDER) </P>
            </div>
            <hr/>
            <div CLASS="ABOUT-GRID">
                <div CLASS="I-AM">
                    <H2>I AM:</H2>
                    <UL CLASS="ABOUT-LIST">
                        <li> A student</li>
                        <li> A gamer </li>
                        <li> A friend</li>
                    </UL>
                </div>
                <div CLASS="I LIKE">
                    <H2> I LIKE:</H2>
                    <UL CLASS="ABOUT-LIST">
                        <LI> To play games </LI>
                        <li> To learn new things</li>
                        <li> To make friends</li>
                    </UL>
                </div>
            </div>
            <hr/>
            <div>
                <h3 CLASS="WORK-HEADING">MY WORKS</h3>
                <div CLASS="WORK-GRID">
                    <div class="work-image-wrapper">
                        <IMG CLASS="work-image" WIDTH="300" HEIGHT="300" SRC="IMG/images (1).jpg"/>
                        <h4> WORK 1</h4>
                    </div>
                   <div class="work-image-wrapper">
                    <IMG CLASS="work-image" WIDTH="300" HEIGHT="300" SRC="IMG/images (2).jpg"/>
                    <h4> WORK 2</h4>
                   </div>
                   <div class="work-image-wrapper">
                    <IMG CLASS="work-image" WIDTH="300" HEIGHT="300" SRC="IMG/images.jpg"/>
                    <h4>WORK 3</h4>
                   </div>
                   <div class="work-image-wrapper">
                    <IMG CLASS="work-image" WIDTH="300" HEIGHT="300" SRC="IMG/IMAGES (3).jpg"/>
                    <h4>WORK 4</h4>
                   </div>
                </div>
            </div>
            <hr/>
            <div CLASS="LINK-AND-CONTACTS">
                <div>
                    <h3 CLASS="LINKS">Links</h3>
                    <UL CLASS="LINK-LIST">
                        <li>    <A Href="https://gogoanime.nl/">gogoanime</A>
                        </li>
                        <li> 
                         <a href="https://gogoanime.nl/">animekisa</a>
                        </li>
                         <li> <a href="https://9anime.vc/home">9anime</a> </li>
                    </UL>
                </div>
                    <div>
                       <form action="#">
                        <label for="email">
                           <h4>EMAIL</h4> 
                           <INPUT ID="email" placeholder="ENTER YOUR EMAIL"/>
                       </label>
                             <label for="message">
                                <h4>MESSAGE</h4>
                                 <textarea ID="message">YOUR MESSAGE</textarea>
                             </label>
                             <div class="submit-button-wrapper">
                                <INPUT id="submit-button" type="submit" value="send me a message">
                             </div>
                        </form>
                    </div>    
            </div>
        </div>
        <script src="script.js"></script>
    </BODY>
</html>
